<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFPM ASC 2026 Launch</title>
  <style>
    :root {
      --bg1: #081321;
      --bg2: #0d1f33;
      --accent: #38d6ff;
      --text: #ffffff;
      --muted: #c8d6e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(56,214,255,0.12), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 520px;
    }
    h1 {
      font-size: 1.7rem;
      line-height: 1.3;
      margin: 0 0 12px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
      margin: 0 0 32px;
    }
    .button-wrap {
      position: relative;
      display: inline-block;
      margin: 10px 0 28px;
    }
    .pulse-ring {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      border: 2px solid rgba(56,214,255,0.28);
      animation: pulse 2s infinite;
      pointer-events: none;
    }
    .launch-btn {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: bold;
      background: radial-gradient(circle at 30% 30%, #aaf4ff, var(--accent));
      color: #052033;
      box-shadow: 0 0 30px rgba(56,214,255,0.4);
      -webkit-tap-highlight-color: transparent;
    }
    .launch-btn:hover,
    .launch-btn:focus {
      outline: none;
      box-shadow: 0 0 36px rgba(56,214,255,0.52);
    }
    .helper {
      color: var(--muted);
      font-size: 0.98rem;
      margin: 0;
    }
    .footer {
      margin-top: 24px;
      font-size: 0.92rem;
      color: #a9bbcc;
    }
    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 1; }
      70% { transform: scale(1.1); opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AFPM Annual Scientific Conference 2026</h1>
    <div class="subtitle">Redefining Family Medicine with Digital Health Technology</div>

    <div class="button-wrap">
      <div class="pulse-ring"></div>
      <a class="launch-btn" href="./thankyou.html">Tap to Launch</a>
    </div>

    <p class="helper">Tap once to contribute to the official launching ceremony.</p>
    <div class="footer">Academy of Family Physicians of Malaysia</div>
  </div>
</body>
</html>
